<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Results — Vector Racers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="components.css">
</head>
<body>
  <div class="shell">
    <header class="shell__header">
      <a class="shell__brand" href="index.html">Vector <span>Racers</span></a>
      <nav class="shell__nav" aria-label="Main">
        <a href="lobby.html">Lobby</a>
        <a href="room-post-race.html" aria-current="page">Results</a>
      </nav>
    </header>
    <main class="shell__main" id="main">
      <h1 class="page-title">Race results <span class="page-title__sub">Neon Hairpin</span></h1>

      <div class="data-table-wrap">
        <table class="data-table">
          <caption class="sr-only">Finish order and times</caption>
          <thead>
            <tr>
              <th scope="col">Pos</th>
              <th scope="col">Player</th>
              <th scope="col" class="num">Total time</th>
              <th scope="col" class="num">Fastest lap</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>You</td>
              <td class="num">4:12.08</td>
              <td class="num">0:48.21</td>
            </tr>
            <tr>
              <td>2</td>
              <td>VectorKing</td>
              <td class="num">4:18.44</td>
              <td class="num">0:49.02</td>
            </tr>
            <tr>
              <td>3</td>
              <td>GridGhost</td>
              <td class="num">—</td>
              <td class="num">—</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="form-row form-row--post-race-actions">
        <a class="btn btn--secondary" href="lobby.html">Return to Lobby</a>
        <a class="btn btn--primary" href="room-pre-race.html">Rematch</a>
      </div>
    </main>
    <footer class="shell__footer"><a href="index.html">← Design hub</a></footer>
  </div>
</body>
</html>
