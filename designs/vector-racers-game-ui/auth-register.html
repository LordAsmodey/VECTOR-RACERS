<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — Vector Racers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="components.css">
</head>
<body>
  <div class="shell">
    <header class="shell__header">
      <a class="shell__brand" href="index.html">Vector <span>Racers</span></a>
      <nav class="shell__nav" aria-label="Main">
        <a href="index.html">Hub</a>
        <a href="auth-login.html">Login</a>
        <a href="auth-register.html" aria-current="page">Register</a>
      </nav>
    </header>
    <main class="shell__main" id="main">
      <article class="card auth-card">
        <h1 class="page-title auth-title">Create account</h1>
        <form action="#" method="post" novalidate>
          <div class="form-group">
            <label class="form-label" for="reg-display">Display name</label>
            <input class="form-input" type="text" id="reg-display" name="displayName" required minlength="2" maxlength="24" placeholder="NeonDriver" pattern="[A-Za-z0-9_\-\s]+" aria-describedby="reg-display-hint">
            <p id="reg-display-hint" class="form-hint">2–24 characters, letters, numbers, spaces, _ or -</p>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">Email</label>
            <input class="form-input" type="email" id="reg-email" name="email" autocomplete="email" required placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">Password</label>
            <input class="form-input" type="password" id="reg-password" name="password" autocomplete="new-password" required minlength="8" placeholder="••••••••" aria-describedby="reg-password-hint">
            <p id="reg-password-hint" class="form-hint">At least 8 characters; mix letters and numbers for strength.</p>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password2">Confirm password</label>
            <input class="form-input" type="password" id="reg-password2" name="passwordConfirm" autocomplete="new-password" required placeholder="••••••••" aria-describedby="reg-password2-hint">
            <p id="reg-password2-hint" class="form-hint">Must match the password above.</p>
          </div>
          <div class="form-group form-row">
            <label class="form-check">
              <input type="checkbox" name="terms" id="reg-terms" required>
              <span>I agree to the <a href="#">Terms</a> and <a href="#">Privacy</a></span>
            </label>
          </div>
          <button type="submit" class="btn btn--primary btn--block">Register</button>
        </form>
        <p class="auth-alt-link">
          Already have an account? <a href="auth-login.html">Sign in</a>
        </p>
      </article>
    </main>
    <footer class="shell__footer"><a href="index.html">← Design hub</a></footer>
  </div>
</body>
</html>
