<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Room — Pre-race — Vector Racers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="components.css">
</head>
<body>
  <div class="shell">
    <header class="shell__header">
      <a class="shell__brand" href="index.html">Vector <span>Racers</span></a>
      <nav class="shell__nav" aria-label="Main">
        <a href="lobby.html">Lobby</a>
        <a href="room-pre-race.html" aria-current="page">Room</a>
      </nav>
    </header>
    <main class="shell__main" id="main">
      <div class="form-row room-head">
        <h1 class="page-title room-title">Neon Hairpin</h1>
        <div>
          <span class="room-code-label">Room code</span>
          <span class="badge room-code-badge" translate="no">K7M2QP</span>
        </div>
      </div>

      <section class="card" aria-labelledby="players-heading">
        <h2 id="players-heading" class="card__title">Players</h2>
        <ul class="room-list">
          <li class="room-list__item">
            <span><strong>You</strong> <span class="room-player-note">(Neon Pulse)</span></span>
            <span class="room-player-ready" aria-label="Ready">✓ Ready</span>
          </li>
          <li class="room-list__item">
            <span><strong>VectorKing</strong></span>
            <span class="room-player-ready" aria-label="Ready">✓ Ready</span>
          </li>
          <li class="room-list__item">
            <span><strong>GridGhost</strong></span>
            <span class="room-player-note">Waiting…</span>
          </li>
          <li class="room-list__item">
            <span><strong>Open slot</strong></span>
            <span class="room-player-note">—</span>
          </li>
        </ul>
      </section>

      <div class="room-ready-cta">
        <a class="btn btn--primary btn--room-ready" href="room-race.html">READY</a>
        <p class="form-hint room-ready-hint">When everyone is ready, countdown 3-2-1-GO starts (TASK-014).</p>
      </div>
    </main>
    <footer class="shell__footer"><a href="index.html">← Design hub</a></footer>
  </div>
</body>
</html>
