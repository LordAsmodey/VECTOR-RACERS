  <g transform="translate(0, 248)" aria-hidden="true">
    <rect x="168" y="0" width="8" height="10" fill="#ffffff" />
    <rect x="176" y="0" width="8" height="10" fill="#111111" />
    <rect x="184" y="0" width="8" height="10" fill="#ffffff" />
    <rect x="192" y="0" width="8" height="10" fill="#111111" />
    <rect x="200" y="0" width="8" height="10" fill="#ffffff" />
    <rect x="208" y="0" width="8" height="10" fill="#111111" />
    <rect x="216" y="0" width="8" height="10" fill="#ffffff" />
    <rect x="224" y="0" width="8" height="10" fill="#111111" />
