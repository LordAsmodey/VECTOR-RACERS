<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <filter id="vr-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="vr-glow-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="vr-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1020" />
      <stop offset="55%" stop-color="#04060c" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <marker id="vr-arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#ff2ea6" />
    </marker>
  </defs>

  <rect width="400" height="260" fill="url(#vr-sky)" />

  <g opacity="0.35" stroke="#008844" fill="none" stroke-width="0.5">
    <line x1="0" y1="210" x2="400" y2="210" />
    <line x1="0" y1="180" x2="400" y2="180" />
    <line x1="0" y1="150" x2="400" y2="150" />
    <line x1="40" y1="260" x2="200" y2="32" />
    <line x1="120" y1="260" x2="200" y2="32" />
    <line x1="200" y1="260" x2="200" y2="32" />
    <line x1="280" y1="260" x2="200" y2="32" />
    <line x1="360" y1="260" x2="200" y2="32" />
  </g>

  <path
    d="M 18 258 Q 125 95 194 36"
    fill="none"
    stroke="#00ff88"
    stroke-width="3.5"
    stroke-linecap="round"
    filter="url(#vr-glow)"
  />
  <path
    d="M 382 258 Q 275 95 206 36"
    fill="none"
    stroke="#00ff88"
    stroke-width="3.5"
