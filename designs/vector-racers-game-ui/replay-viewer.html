<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Replay — Vector Racers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="components.css">
</head>
<body>
  <div class="shell">
    <header class="shell__header">
      <a class="shell__brand" href="index.html">Vector <span>Racers</span></a>
      <nav class="shell__nav" aria-label="Main">
        <a href="replay-viewer.html" aria-current="page">Replay</a>
        <a href="profile.html">Profile</a>
      </nav>
    </header>
    <main class="shell__main" id="main">
      <h1 class="page-title">Replay <span class="page-title__sub">Neon Hairpin · Mar 14, 2026</span></h1>

      <section class="replay-viewport" aria-label="Replay viewport">
        <img
          class="replay-viewport__img"
          src="img/race-view-full.png"
          alt="Replay frame: two cars on neon race track, magenta with thrust vector, lime ahead."
        />
      </section>

      <div class="replay-bar" role="region" aria-label="Playback controls">
        <button type="button" class="btn btn--secondary" aria-label="Skip to start">⏮</button>
        <button type="button" class="btn btn--primary" aria-label="Play">Play</button>
        <button type="button" class="btn btn--secondary" aria-label="Pause">Pause</button>
        <button type="button" class="btn btn--secondary" aria-label="Skip to end">⏭</button>
        <label class="sr-only" for="replay-speed">Playback speed</label>
        <select class="form-select replay-speed" id="replay-speed">
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
        <div class="replay-turn-wrap">
          <label class="replay-turn-label" for="replay-turn">Turn 7</label>
          <input class="replay-slider" type="range" id="replay-turn" name="turn" min="1" max="18" value="7" aria-label="Turn scrubber">
        </div>
        <div class="replay-bar__timeline">
          <div class="replay-times">
            <span>1:02</span>
            <span>4:18</span>
          </div>
          <input class="replay-slider" type="range" id="replay-timeline" name="t" min="0" max="258" value="72" aria-label="Timeline position">
        </div>
      </div>

      <p class="replay-annotation" aria-live="polite">Turn 7 · Player <strong>VectorKing</strong></p>
    </main>
    <footer class="shell__footer"><a href="index.html">← Design hub</a></footer>
  </div>
</body>
</html>
