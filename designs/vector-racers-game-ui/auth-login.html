<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Vector Racers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600&family=Orbitron:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="components.css">
</head>
<body>
  <div class="shell">
    <header class="shell__header">
      <a class="shell__brand" href="index.html">Vector <span>Racers</span></a>
      <nav class="shell__nav" aria-label="Main">
        <a href="index.html">Hub</a>
        <a href="auth-login.html" aria-current="page">Login</a>
        <a href="auth-register.html">Register</a>
      </nav>
    </header>
    <main class="shell__main" id="main">
      <article class="card auth-card">
        <h1 class="page-title auth-title">Sign in</h1>
        <form action="#" method="post" novalidate>
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input class="form-input" type="email" id="login-email" name="email" autocomplete="email" required placeholder="you@example.com" aria-describedby="login-email-hint">
            <p id="login-email-hint" class="form-hint">Use the email you registered with.</p>
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input class="form-input" type="password" id="login-password" name="password" autocomplete="current-password" required placeholder="••••••••" minlength="8" aria-describedby="login-password-hint">
            <p id="login-password-hint" class="form-hint">Minimum 8 characters.</p>
            <p class="form-error" role="alert" hidden>Invalid email or password.</p>
          </div>
          <div class="form-group form-row">
            <label class="form-check">
              <input type="checkbox" name="remember" id="login-remember">
              <span>Remember me on this device</span>
            </label>
          </div>
          <button type="submit" class="btn btn--primary btn--block">Sign in</button>
        </form>
        <p class="auth-alt-link">
          No account? <a href="auth-register.html">Create one</a>
        </p>
      </article>
    </main>
    <footer class="shell__footer"><a href="index.html">← Design hub</a></footer>
  </div>
</body>
</html>
