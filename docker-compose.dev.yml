# Local development only: PostgreSQL + Redis.
# Next.js and NestJS run on the host via `pnpm dev` (see README).
#
# Postgres credentials are not hardcoded here — set POSTGRES_USER, POSTGRES_PASSWORD,
# POSTGRES_DB in a project-root `.env` (copy from `.env.example`). Docker Compose
# substitutes variables from that file.

services:
  postgres:
    image: postgres:16-alpine
    container_name: vector-racers-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Host 5433 avoids clashing with another Postgres on the machine (often bound to 5432).
    ports:
      - "5433:5432"
    volumes:
      - vector_racers_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"${POSTGRES_USER}\" -d \"${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vector-racers-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - vector_racers_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vector_racers_postgres_data:
  vector_racers_redis_data:
