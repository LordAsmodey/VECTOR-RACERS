name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      docker_push:
        description: "Force Docker image push to GHCR"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  resolve-node:
    name: Resolve Node major
    runs-on: ubuntu-latest
    outputs:
      node_major: ${{ steps.resolve.outputs.node_major }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Resolve Node major from script
        id: resolve
        run: node .github/scripts/resolve-node-major.mjs

  prisma-pr-checks:
    name: Prisma PR checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: resolve-node
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vector_racers
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vector_racers?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.resolve-node.outputs.node_major }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @vector-racers/db exec prisma validate --schema ./prisma/schema.prisma

      - name: Check Prisma migration lock
        id: prisma_migrations_lock
        run: |
          if [ -f "packages/db/prisma/migrations/migration_lock.toml" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate missing Prisma migrations (CI only)
        if: steps.prisma_migrations_lock.outputs.present != 'true'
        run: pnpm --filter @vector-racers/db exec prisma migrate dev --name ci_init --create-only --skip-generate --skip-seed --schema ./prisma/schema.prisma

      - name: Check Prisma migrations drift
        run: pnpm --filter @vector-racers/db exec prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma --shadow-database-url "${DATABASE_URL}" --exit-code

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: resolve-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.resolve-node.outputs.node_major }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: resolve-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.resolve-node.outputs.node_major }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: resolve-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.resolve-node.outputs.node_major }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package (types)
        run: pnpm --filter @vector-racers/shared build

      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: resolve-node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.resolve-node.outputs.node_major }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-${{ needs.resolve-node.outputs.node_major }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

  detect-dockerfiles:
    name: Detect Dockerfiles
    runs-on: ubuntu-latest
    outputs:
      has_api_dockerfile: ${{ steps.detect.outputs.has_api_dockerfile }}
      has_web_dockerfile: ${{ steps.detect.outputs.has_web_dockerfile }}
      has_any_dockerfile: ${{ steps.detect.outputs.has_any_dockerfile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Dockerfile presence
        id: detect
        run: node .github/scripts/check-dockerfiles.mjs

  docker-images:
    name: Docker build/push (GHCR)
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
      - build
      - detect-dockerfiles
    if: needs.detect-dockerfiles.outputs.has_any_dockerfile == 'true'
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      SHOULD_PUSH: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.docker_push == 'true')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (api)
        id: meta_api
        if: needs.detect-dockerfiles.outputs.has_api_dockerfile == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vector-racers-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push API image
        if: needs.detect-dockerfiles.outputs.has_api_dockerfile == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}

      - name: Docker metadata (web)
        id: meta_web
        if: needs.detect-dockerfiles.outputs.has_web_dockerfile == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vector-racers-web
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push Web image
        if: needs.detect-dockerfiles.outputs.has_web_dockerfile == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
